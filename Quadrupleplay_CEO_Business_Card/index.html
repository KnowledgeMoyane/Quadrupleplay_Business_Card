<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Sthembiso Dlamini · Digital Card</title>
  <!-- Poppins + DM Mono (no curly/serif fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <!-- html2canvas for image capture -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-white: #ffffff;
      --card-bg: #ffffff;
      --border-light: #e0e7e4;
      --primary-blue: #1b4b6c;
      --primary-green: #2c7a5a;
      --accent-soft: #5ba88c;
      --text-dark: #1a2b2c;
      --text-muted: #5e6f6b;
      --text-subtle: #7c8c87;
      --hover-bg: #f4f9f7;
      --shadow-sm: 0 6px 18px rgba(0,0,0,0.05);
    }

    body {
      background: #f5f7f6;
      background-image: linear-gradient(135deg, #f0f4f3 0%, #ffffff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      padding: 24px;
      margin: 0;
      position: relative;
    }

    /* very light grain for texture */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .card-wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 440px;
    }

    .card {
      position: relative;
      background: var(--card-bg);
      border: 1px solid #dce4e0;
      border-radius: 32px;
      box-shadow: 0 25px 45px rgba(0, 30, 20, 0.08), 0 0 0 1px rgba(44, 122, 90, 0.1);
      padding: 44px 38px 38px;
      animation: softFade 0.8s ease-out;
      transition: box-shadow 0.2s;
    }

    .card:hover {
      box-shadow: 0 30px 50px rgba(0, 40, 25, 0.12);
    }

    @keyframes softFade {
      0% { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* top accent bar using logo colors */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 24px;
      right: 24px;
      height: 3px;
      background: linear-gradient(90deg, #1b4b6c, #2c7a5a, #1b4b6c);
      border-radius: 8px 8px 0 0;
      opacity: 0.8;
    }

    .brand-tag {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #1b4b6c;
      font-weight: 500;
    }

    .brand-tag::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #d0ddd6;
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 26px;
    }

    .logo-badge {
      width: 64px;
      height: 64px;
      background: white;
      border: 1px solid #c8d9d2;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 16px rgba(0,0,0,0.02);
      background: #ffffff;
      flex-shrink: 0;
      overflow: hidden;
      padding: 8px;
    }

    .logo-badge img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }

    .name-title h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      font-size: 38px;
      line-height: 1.2;
      color: #1a2b2c;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .name-title h1 .highlight {
      color: #1b4b6c;
      font-weight: 600;
    }

    .job-position {
      font-family: 'Poppins', sans-serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.3px;
      color: #2c7a5a;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .job-position::before {
      content: '';
      display: inline-block;
      width: 16px;
      height: 2px;
      background: #2c7a5a;
      border-radius: 2px;
    }

    .divider {
      margin: 28px 0 24px;
      height: 1px;
      background: #e2ebe6;
    }

    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 30px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: #1a2b2c;
      padding: 8px 0;
      border-radius: 10px;
      transition: background 0.15s, transform 0.15s;
      cursor: pointer;
    }

    a.contact-item {
      text-decoration: none;
      color: inherit;
    }

    a.contact-item:hover {
      background: #f6faf8;
      transform: translateX(3px);
      text-decoration: none;
    }

    .contact-item:not(a):hover {
      background: #f6faf8;
      transform: translateX(3px);
    }

    .icon-square {
      width: 38px;
      height: 38px;
      background: #f0f6f3;
      border: 1px solid #d9e8e0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1b4b6c;
      flex-shrink: 0;
      transition: 0.2s;
    }

    .contact-item:hover .icon-square {
      background: #e3f1ea;
      border-color: #2c7a5a;
      color: #0e3b2b;
    }

    .info-text {
      display: flex;
      flex-direction: column;
    }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 8.5px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7c8c87;
      margin-bottom: 2px;
      font-weight: 500;
    }

    .value {
      font-family: 'Poppins', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #1e2f2d;
      word-break: break-word;
      line-height: 1.4;
    }

    a .value {
      color: #1b4b6c;
      text-decoration: none;
    }

    a:hover .value {
      color: #2c7a5a;
      text-decoration: underline;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      flex: 1;
      padding: 14px 10px;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
      background: white;
      text-decoration: none;
    }

    .btn-primary {
      background: #1b4b6c;
      color: white;
      border: 1px solid #1b4b6c;
      box-shadow: 0 4px 10px rgba(27, 75, 108, 0.2);
    }

    .btn-primary:hover {
      background: #1f577a;
      border-color: #1f577a;
      box-shadow: 0 8px 16px rgba(27, 75, 108, 0.25);
    }

    .btn-secondary {
      background: white;
      border: 1px solid #cbd9d2;
      color: #1b4b6c;
    }

    .btn-secondary:hover {
      background: #f3f8f5;
      border-color: #2c7a5a;
      color: #0e3b2b;
    }

    .footer-note {
      margin-top: 28px;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 8.5px;
      letter-spacing: 0.25em;
      color: #9aada6;
      text-transform: uppercase;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(15px);
      background: #1b4b6c;
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.3px;
      border: 1px solid #2c7a5a;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
      background: #0f2e3b;
      box-shadow: 0 10px 22px rgba(0,0,0,0.15);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Loading spinner for save button */
    .spinner {
      display: none;
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-primary.loading .btn-text,
    .btn-primary.loading .btn-icon {
      display: none;
    }
    .btn-primary.loading .spinner {
      display: inline-block;
    }

    @media (max-width: 480px) {
      .card {
        padding: 34px 24px 30px;
      }
      .name-title h1 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="card-wrapper">
    <div class="card" id="businessCard">
      <div class="brand-tag">Quadrupleplay Holdings</div>

      <div class="profile-row">
        <div class="logo-badge">
          <!-- Logo image with proper fitting -->
          <img src="logo.png" alt="Quadrupleplay Logo" />
        </div>
        <div class="name-title">
          <h1>Sthembiso <span class="highlight">Dlamini</span></h1>
          <div class="job-position">Chief Executive Officer</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="contact-list">
        <!-- Phone - Clickable -->
        <a href="tel:+27665683126" class="contact-item">
          <div class="icon-square">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.22 2.18 2 2 0 012.22 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.18 6.18l1.28-1.28a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
            </svg>
          </div>
          <div class="info-text">
            <span class="label">Mobile</span>
            <span class="value">+27 66 568 3126</span>
          </div>
        </a>

        <!-- Email - Clickable -->
        <a href="mailto:Sthembiso@quadrupleplay.holdings" class="contact-item">
          <div class="icon-square">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
          <div class="info-text">
            <span class="label">Email</span>
            <span class="value">Sthembiso@quadrupleplay.holdings</span>
          </div>
        </a>

        <!-- Office Address - Not clickable -->
        <div class="contact-item">
          <div class="icon-square">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
          </div>
          <div class="info-text">
            <span class="label">Office</span>
            <span class="value">Office 7, Block C, Carpe Diem, 26 Quantum Street, Techno Park, Stellenbosch.</span>
          </div>
        </div>

        <!-- Website - Clickable -->
        <a href="https://www.quadrupleplay.co.za" target="_blank" rel="noopener noreferrer" class="contact-item">
          <div class="icon-square">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
            </svg>
          </div>
          <div class="info-text">
            <span class="label">Website</span>
            <span class="value">www.quadrupleplay.co.za</span>
          </div>
        </a>
      </div>

      <div class="action-buttons">
        <button class="btn btn-primary" id="saveContactBtn" onclick="saveAsImage()">
          <span class="btn-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </span>
          <span class="btn-text">Save to Gallery</span>
          <div class="spinner"></div>
        </button>
        <button class="btn btn-secondary" id="shareCardBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          Share
        </button>
      </div>

      <div class="footer-note">Tap · Connect</div>
    </div>
  </div>

  <!-- Hidden high-res canvas for rendering -->
  <div id="renderContainer" style="position: absolute; left: -9999px; top: 0; width: 1200px; visibility: hidden;"></div>

  <div class="toast" id="liveToast"></div>

  <script>
    (function() {
      const toast = document.getElementById('liveToast');
      const saveBtn = document.getElementById('saveContactBtn');
      const shareBtn = document.getElementById('shareCardBtn');
      const cardElement = document.getElementById('businessCard');
      const renderContainer = document.getElementById('renderContainer');

      function showToast(text) {
        if (!toast) return;
        toast.textContent = text;
        toast.classList.add('show');
        clearTimeout(window.toastTimer);
        window.toastTimer = setTimeout(() => {
          toast.classList.remove('show');
        }, 3000);
      }

      // Function to save business card as high-resolution image
      async function saveAsImage() {
        // Show loading state
        saveBtn.classList.add('loading');
        saveBtn.disabled = true;
        showToast('Generating high-res image...');
        
        try {
          // Clone the card for rendering at higher resolution
          const clone = cardElement.cloneNode(true);
          clone.style.width = '1200px';
          clone.style.maxWidth = '1200px';
          clone.style.transform = 'scale(1)';
          clone.style.padding = '132px 114px 114px';
          clone.style.borderRadius = '96px';
          
          // Scale up fonts for the larger canvas
          const h1 = clone.querySelector('h1');
          if (h1) h1.style.fontSize = '114px';
          
          const jobPos = clone.querySelector('.job-position');
          if (jobPos) jobPos.style.fontSize = '39px';
          
          const labels = clone.querySelectorAll('.label');
          labels.forEach(label => {
            label.style.fontSize = '25px';
            label.style.letterSpacing = '0.2em';
          });
          
          const values = clone.querySelectorAll('.value');
          values.forEach(value => {
            value.style.fontSize = '42px';
          });
          
          const brandTag = clone.querySelector('.brand-tag');
          if (brandTag) {
            brandTag.style.fontSize = '27px';
            brandTag.style.letterSpacing = '0.3em';
          }
          
          const footerNote = clone.querySelector('.footer-note');
          if (footerNote) {
            footerNote.style.fontSize = '25px';
          }
          
          const iconSquares = clone.querySelectorAll('.icon-square');
          iconSquares.forEach(icon => {
            icon.style.width = '114px';
            icon.style.height = '114px';
            icon.style.borderRadius = '30px';
          });
          
          const logoBadge = clone.querySelector('.logo-badge');
          if (logoBadge) {
            logoBadge.style.width = '192px';
            logoBadge.style.height = '192px';
            logoBadge.style.borderRadius = '60px';
          }
          
          const btns = clone.querySelectorAll('.btn');
          btns.forEach(btn => {
            btn.style.padding = '42px 30px';
            btn.style.fontSize = '33px';
            btn.style.borderRadius = '42px';
          });
          
          const divider = clone.querySelector('.divider');
          if (divider) {
            divider.style.margin = '84px 0 72px';
          }
          
          const contactItems = clone.querySelectorAll('.contact-item');
          contactItems.forEach(item => {
            item.style.gap = '48px';
            item.style.padding = '24px 0';
          });
          
          const contactList = clone.querySelector('.contact-list');
          if (contactList) {
            contactList.style.gap = '54px';
            contactList.style.marginBottom = '90px';
          }
          
          const profileRow = clone.querySelector('.profile-row');
          if (profileRow) {
            profileRow.style.gap = '54px';
            profileRow.style.marginBottom = '78px';
          }
          
          const actionButtons = clone.querySelector('.action-buttons');
          if (actionButtons) {
            actionButtons.style.gap = '36px';
            actionButtons.style.marginTop = '24px';
          }
          
          // Add clone to render container
          renderContainer.innerHTML = '';
          renderContainer.appendChild(clone);
          renderContainer.style.visibility = 'visible';
          
          // Wait for fonts and images to be applied
          await new Promise(resolve => setTimeout(resolve, 500));
          
          // Capture the cloned card at high resolution
          const canvas = await html2canvas(clone, {
            scale: 2,
            useCORS: true,
            allowTaint: true,
            backgroundColor: '#ffffff',
            logging: false,
            width: 1200,
            windowWidth: 1200,
            onclone: function(clonedDoc) {
              const allElements = clonedDoc.querySelectorAll('*');
              allElements.forEach(el => {
                el.style.webkitFontSmoothing = 'antialiased';
                el.style.mozOsxFontSmoothing = 'grayscale';
              });
            }
          });
          
          // Hide render container
          renderContainer.style.visibility = 'hidden';
          renderContainer.innerHTML = '';
          
          // Convert canvas to high-quality PNG blob
          canvas.toBlob(async (blob) => {
            if (!blob) {
              throw new Error('Failed to create image blob');
            }
            
            // Create filename with timestamp
            const timestamp = new Date().toISOString().slice(0, 10);
            const filename = `Sthembiso-Dlamini-Business-Card-${timestamp}.png`;
            
            // Create file object
            const file = new File([blob], filename, { type: 'image/png' });
            
            // Try to use Web Share API for direct gallery save (mobile)
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              try {
                await navigator.share({
                  files: [file],
                  title: 'Sthembiso Dlamini - Business Card',
                  text: 'Quadrupleplay Holdings CEO - Business Card'
                });
                showToast('✓ High-res image saved to gallery');
              } catch (shareError) {
                if (shareError.name !== 'AbortError') {
                  downloadHighResImage(blob, filename);
                } else {
                  showToast('Save cancelled');
                }
              }
            } else {
              downloadHighResImage(blob, filename);
            }
            
            // Reset button state
            saveBtn.classList.remove('loading');
            saveBtn.disabled = false;
            
          }, 'image/png', 1.0);
          
        } catch (error) {
          console.error('Error capturing high-res image:', error);
          showToast('⚠️ Trying alternative method...');
          
          try {
            const canvas = await html2canvas(cardElement, {
              scale: 4,
              useCORS: true,
              allowTaint: true,
              backgroundColor: '#ffffff',
              logging: false
            });
            
            canvas.toBlob(async (blob) => {
              const timestamp = new Date().toISOString().slice(0, 10);
              const filename = `Sthembiso-Dlamini-${timestamp}.png`;
              downloadHighResImage(blob, filename);
              showToast('✓ Business card downloaded');
            }, 'image/png', 1.0);
            
          } catch (fallbackError) {
            console.error('Fallback also failed:', fallbackError);
            showToast('⚠️ Could not save image');
          }
          
          saveBtn.classList.remove('loading');
          saveBtn.disabled = false;
        }
      }

      function downloadHighResImage(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        
        setTimeout(() => {
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 100);
        
        showToast('✓ Crystal clear business card saved');
      }

      window.saveAsImage = saveAsImage;

      // Share button handler
      shareBtn.addEventListener('click', async (e) => {
        e.preventDefault();
        const shareData = {
          title: 'Sthembiso Dlamini — CEO',
          text: 'Sthembiso Dlamini, Chief Executive Officer at Quadrupleplay Holdings.',
          url: 'https://www.quadrupleplay.co.za'
        };

        if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
          try {
            await navigator.share(shareData);
            showToast('Shared successfully');
          } catch (err) {
            if (err.name !== 'AbortError') {
              fallbackCopy();
            }
          }
        } else {
          fallbackCopy();
        }
      });

      function fallbackCopy() {
        navigator.clipboard.writeText('https://www.quadrupleplay.co.za').then(() => {
          showToast('🔗 Link copied');
        }).catch(() => {
          showToast('Copy link manually');
        });
      }
    })();
  </script>
</body>
</html>
